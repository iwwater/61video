<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="referrer" content="no-referrer" />
    <link rel="icon" type="image/webp" href="/icon.webp" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="61" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="61 视频站" />
    <title>61</title>
    <!-- Premium Fonts Preconnect & Links -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- 异步加载 Google Fonts：先 preload as style，再在 onload 里切到 stylesheet，
         避免阻塞首屏渲染。noscript 兜底给禁 JS 的环境。 -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"></noscript>
    <!--
      在 React 挂载前，从 localStorage 同步上次保存的主题，立刻设到 <html data-theme>，
      避免"先黑后粉"的闪烁。真实的服务端值会在 main.tsx 启动时异步对齐。
    -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("video-site:theme");
          // 兼容 3 套后端主题 + 4 套 P1 客户端主题
          if (t === "pink" || t === "dark" || t === "sky") {
            document.documentElement.setAttribute("data-theme", t);
          } else if (t === "light" || t === "eyecare" || t === "green") {
            // P1 主题：仅 4 选，落到对应后端主题
            var map = { light: "pink", eyecare: "sky", green: "pink" };
            document.documentElement.setAttribute("data-theme", map[t]);
            document.documentElement.classList.add("theme-p1-" + t);
          } else {
            document.documentElement.setAttribute("data-theme", "dark");
          }
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
